{% extends "base.html" %}

{% block title %}404 | CTF Platform{% endblock %}

{% block content %}
<section class="error-shell">
  <div class="container">
    <div class="error-card">
      <p class="error-code">404</p>
      <h1 class="error-title">Target Not Found</h1>
      <p class="error-text">
        The route you requested does not exist or is no longer available.
      </p>
      <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Return Home</a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('challenges.list_challenges') }}" class="btn btn-secondary">View Challenges</a>
        {% endif %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
